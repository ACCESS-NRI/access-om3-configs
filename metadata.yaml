description: |-
  25km ACCESS-OM3 global configuration under interannual forcing.
  Initial conditions of temperature and salinity are from WOA23.
  Run with JRA55-do v1.6.0 interannually-varying forcing, 1 Jan 1958 - 31 Dec 2023.
  This configuration includes WOMBATlite biogeochemistry with time-varying, globally-
  averaged atmospheric CO2 forcing. Initial WOMBATlite prognostic tracer
  concentrations are:
  - no3, o2, dic, alk: from GLODAPv2 2016b
  - fe: from Tagliabue et al. 2016 (doi:10.1002/2015GB005289)
  - remaining tracers: set to constant values
notes: |-
